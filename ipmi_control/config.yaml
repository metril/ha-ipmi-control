name: "IPMI Control"
version: "2.0.2"
slug: "ipmi_control"
image: ghcr.io/metril/ha-ipmi-control-{arch}
description: "IPMI/BMC management proxy for Home Assistant"
url: "https://github.com/metril/ha-ipmi-control"
arch:
  - amd64
  - aarch64
init: false
startup: application
boot: auto
host_network: false
discovery:
  - ipmi_control
options:
  max_concurrent: 8
schema:
  max_concurrent: int(1,32)
